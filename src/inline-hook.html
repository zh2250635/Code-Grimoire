<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Hook 聚焦模式演示</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --tape-color: #252526;
            --instruction-bg: #333333;
            --highlight-color: #ffd700; /* 金黄色高亮 */
            --text-color: #cccccc;
            --arrow-color: #ff3333; /* 鲜艳的红色箭头 */
            
            /* 角色颜色 */
            --caller-color: #b180d7;
            --proxy-color: #4ec9b0;
            --original-color: #569cd6;
            --stolen-color: #ce9178;
        }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h2 { margin-bottom: 15px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .controls {
            margin-bottom: 30px;
            padding: 12px 20px;
            background: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 200; /* 控件要在最上层 */
            border: 1px solid #444;
        }

        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            margin: 0 8px;
            transition: all 0.2s;
        }
        button:hover { background-color: #1177bb; transform: translateY(-1px); }
        button:disabled { background-color: #444; cursor: not-allowed; transform: none; }

        .status-bar {
            margin-top: 12px;
            font-size: 15px;
            color: var(--highlight-color);
            height: 20px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* 布局容器 */
        .layout {
            display: flex;
            justify-content: center;
            gap: 40px;
            position: relative;
            width: 100%;
            max-width: 1200px;
            padding: 20px 0;
        }

        .tape-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
            position: relative;
            z-index: 10; /* 代码块在箭头下方 */
            transition: opacity 0.5s;
        }

        .tape-title {
            font-weight: bold;
            margin-bottom: 12px;
            padding: 4px 10px;
            font-size: 14px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .tape {
            background-color: var(--tape-color);
            border: 1px solid #444;
            border-radius: 6px;
            width: 100%;
            padding: 15px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            /* 纸带打孔装饰 */
            background-image: radial-gradient(#3e3e3e 15%, transparent 16%), radial-gradient(#3e3e3e 15%, transparent 16%);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
        }

        .instr {
            background-color: var(--instruction-bg);
            margin: 10px 12px;
            padding: 10px;
            border-radius: 4px;
            border-left: 4px solid transparent;
            font-size: 12px;
            position: relative;
            transition: all 0.5s ease; /* 平滑过渡 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 1;
        }

        /* ------------------ 聚焦模式核心样式 ------------------ */
        
        /* 默认状态：稍微暗一点，等待聚焦 */
        .instr { filter: brightness(0.9); }

        /* 被聚焦（活跃）状态 - 只有当前执行的那条指令有这个状态 */
        .instr.active {
            background-color: #3e3e3e;
            border-left-color: var(--highlight-color);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); /* 发光效果 */
            transform: scale(1.08); /* 稍微放大 */
            color: #fff;
            filter: brightness(1.2);
            z-index: 20; /* 确保放大后在最上层 */
            opacity: 1 !important;
        }

        /* 变暗状态（无关代码） */
        .instr.dimmed {
            opacity: 0.15; /* 极低透明度 */
            filter: grayscale(100%); /* 黑白化 */
            transform: scale(0.95);
        }

        /* ---------------------------------------------------- */

        .type-caller { border-left-color: var(--caller-color); color: #dcd0ff; }
        .type-hook { border-left-color: #ff4d4d; color: #ff9999; }
        .type-proxy { border-left-color: var(--proxy-color); color: #aaddff; }
        .type-stolen { border-left-color: var(--stolen-color); color: #ffccaa; }
        .type-original { border-left-color: var(--original-color); }

        /* SVG 层：始终在最顶层 */
        .arrows-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 允许点击穿透 */
            z-index: 100; /* 【关键】确保在代码块上方 */
            filter: drop-shadow(0 0 5px rgba(255, 50, 50, 0.6)); /* 箭头也发光 */
        }

        path {
            fill: none;
            stroke: var(--arrow-color);
            stroke-width: 4; /* 加粗 */
            stroke-linecap: round;
            stroke-dasharray: 12;
            opacity: 0;
            transition: opacity 0.3s;
            marker-end: url(#arrowhead);
        }
        
        path.show { opacity: 1; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -24; } }

        .note { font-size: 10px; color: #666; text-align: center; margin: 4px 0; }
        
        /* 辅助类：用于标记连线的起点和终点 */
        .instr.related {
            opacity: 0.8;
            filter: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

    </style>
</head>
<body>

    <h2>Inline Hook 执行流演示 (上下文保留模式)</h2>
    
    <div class="controls">
        <button id="startBtn" onclick="runSimulation()">开始演示 (Run)</button>
        <button id="resetBtn" onclick="resetSimulation()" disabled>重置 (Reset)</button>
        <div class="status-bar" id="statusText">点击开始，观察“纸带”高亮效果...</div>
    </div>

    <div class="layout" id="layoutArea">
        <!-- SVG 层 -->
        <svg class="arrows-layer" id="svgLayer">
            <defs>
                <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <polygon points="0 0, 6 3, 0 6" fill="#ff3333" />
                </marker>
            </defs>
            <path id="path0" />
            <path id="path1" />
            <path id="path2" />
            <path id="path3" />
            <path id="path4" />
            <path id="path5" />
        </svg>

        <!-- 0. Caller -->
        <div class="tape-column">
            <div class="tape-title" style="color: var(--caller-color)">0. 调用者</div>
            <div class="tape">
                <div class="instr type-caller" id="c1">
                    <span class="code">MOV X0, #99</span>
                </div>
                <div class="instr type-caller" id="c2">
                    <span class="code">BL Target_Func</span>
                </div>
                <div class="instr type-caller" id="c3">
                    <span class="code">STR X0, [SP]</span>
                </div>
            </div>
        </div>

        <!-- 1. Target -->
        <div class="tape-column">
            <div class="tape-title" style="color: var(--original-color)">1. 原函数</div>
            <div class="tape">
                <div class="note">Hook 入口</div>
                <div class="instr type-hook" id="t1">
                    <span class="code">B Proxy_Func</span>
                </div>
                <div class="instr" style="opacity: 0.2;">...</div>
                <div class="note">----------</div>
                <div class="instr type-original" id="t3">
                    <span class="code">MOV X0, #1</span>
                </div>
                <div class="instr type-original" id="t4">
                    <span class="code">BL task</span>
                </div>
                <div class="instr type-original" id="t5">
                    <span class="code">RET</span>
                </div>
            </div>
        </div>

        <!-- 2. Proxy -->
        <div class="tape-column">
            <div class="tape-title" style="color: var(--proxy-color)">2. 代理函数</div>
            <div class="tape">
                <div class="instr type-proxy" id="p1">
                    <span class="code">SAVE_REGS</span>
                </div>
                <div class="instr type-proxy" id="p2">
                    <span class="code">CALL onBefore</span>
                </div>
                <div class="instr type-proxy" id="p3">
                    <span class="code">BL Trampoline</span>
                </div>
                <div class="instr type-proxy" id="p4">
                    <span class="code">CALL onAfter</span>
                </div>
                <div class="instr type-proxy" id="p6">
                    <span class="code">RET</span>
                </div>
            </div>
        </div>

        <!-- 3. Trampoline -->
        <div class="tape-column">
            <div class="tape-title" style="color: var(--stolen-color)">3. 跳板</div>
            <div class="tape">
                <div class="instr type-stolen" id="tr1">
                    <span class="code">SUB SP...</span>
                </div>
                <div class="instr type-stolen" id="tr2">
                    <span class="code">STP X29...</span>
                </div>
                <div class="instr type-stolen" id="tr4">
                    <span class="code">BR X16</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const delay = ms => new Promise(res => setTimeout(res, ms));
        const statusText = document.getElementById('statusText');

        // 绘制箭头的逻辑 (与之前类似，但增加了 updateArrows 绑定)
        function drawArrow(pathId, fromId, toId, curvature = 'normal') {
            const layout = document.getElementById('layoutArea').getBoundingClientRect();
            const fromEl = document.getElementById(fromId);
            const toEl = document.getElementById(toId);
            const path = document.getElementById(pathId);

            if (!fromEl || !toEl || !path) return;

            const getPos = (el, type) => {
                const rect = el.getBoundingClientRect();
                return {
                    x: (type === 'right' ? rect.right : rect.left) - layout.left,
                    y: (rect.top + rect.height / 2) - layout.top
                };
            };

            let start, end;
            // 简单化的方向判断，为了美观
            if (curvature === 'normal') {
                start = getPos(fromEl, 'right');
                end = getPos(toEl, 'left');
                const midX = (start.x + end.x) / 2;
                path.setAttribute('d', `M ${start.x} ${start.y} Q ${midX} ${start.y + (end.y - start.y)/2} ${end.x} ${end.y}`);
            } else if (curvature === 'back-left') {
                start = getPos(fromEl, 'left');
                end = getPos(toEl, 'right');
                const lowestY = Math.max(start.y, end.y) + 40;
                path.setAttribute('d', `M ${start.x} ${start.y} Q ${(start.x + end.x)/2} ${lowestY} ${end.x} ${end.y}`);
            } else if (curvature === 'big-back') {
                start = getPos(fromEl, 'left');
                end = getPos(toEl, 'left');
                const lowestY = Math.max(start.y, end.y) + 60;
                path.setAttribute('d', `M ${start.x} ${start.y} Q ${(start.x + end.x)/2} ${lowestY} ${end.x} ${end.y}`); 
            }
        }

        function updateArrows() {
            drawArrow('path0', 'c2', 't1', 'normal');
            drawArrow('path1', 't1', 'p1', 'normal');
            drawArrow('path2', 'p3', 'tr1', 'normal');
            drawArrow('path3', 'tr4', 't3', 'back-left');
            drawArrow('path4', 't5', 'p4', 'normal');
            drawArrow('path5', 'p6', 'c3', 'big-back');
        }

        window.addEventListener('load', updateArrows);
        window.addEventListener('resize', updateArrows);

        // ------------------ 聚焦逻辑核心 (已更新) ------------------

        // 设置焦点：传入一个ID数组
        // 规则：只要一条纸带(Tape Column)中包含任何一个 activeId，这条纸带上的所有指令都不变暗
        function setFocus(activeIds) {
            const allInstr = document.querySelectorAll('.instr');
            
            // 1. 找出所有包含高亮指令的“纸带容器”
            const activeColumns = new Set();
            activeIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    const col = el.closest('.tape-column');
                    if (col) activeColumns.add(col);
                }
            });

            // 2. 遍历所有指令，决定是否 dim
            allInstr.forEach(el => {
                const col = el.closest('.tape-column');
                // 判断条件：是自己本身高亮，或者位于一个高亮的列中
                const shouldStayVisible = activeIds.includes(el.id) || (col && activeColumns.has(col));

                if (shouldStayVisible) {
                    el.classList.remove('dimmed');
                } else {
                    el.classList.add('dimmed');
                }
            });
        }

        // 清除所有聚焦效果
        function clearFocus() {
            document.querySelectorAll('.instr').forEach(el => {
                el.classList.remove('active', 'dimmed', 'related');
            });
            document.querySelectorAll('path').forEach(el => el.classList.remove('show'));
        }

        async function step(activeId, relatedIds = [], arrowId = null, text = "") {
            // 1. 设置文本
            if(text) statusText.innerText = text;

            // 2. 移除旧的 active 和 arrow
            document.querySelectorAll('.instr.active').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('path.show').forEach(e => e.classList.remove('show'));

            // 3. 计算本回合所有涉及的 ID (包括箭头两端)
            const allFocusIds = [activeId, ...relatedIds];
            
            // 4. 应用新的聚焦逻辑 (保留上下文)
            setFocus(allFocusIds);

            // 5. 高亮当前主指令 (加粗/放大效果)
            if (activeId) {
                document.getElementById(activeId).classList.add('active');
            }

            // 6. 显示箭头 (如果有)
            if (arrowId) {
                updateArrows(); // 确保位置正确
                document.getElementById(arrowId).classList.add('show');
            }

            await delay(1200);
        }

        async function runSimulation() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('resetBtn').disabled = true;

            // --- 0. Caller Start ---
            await step('c1', [], null, "Caller: 正在处理普通业务...");
            
            // --- 1. Call Target ---
            // 此时 Caller 列和 Target 列都会亮起
            await step('c2', ['t1'], 'path0', "Caller: 准备调用函数 (BL Target)...");

            // --- 2. Hook Entry ---
            await step('t1', ['p1'], 'path1', "Target: 刚进门就踩到 Hook 跳转 (B Proxy)！");

            // --- 3. Proxy Start ---
            await step('p1', [], null, "Proxy: 劫持成功！保存现场");
            await step('p2', [], null, "Proxy: 执行 Before 回调 (修改参数)");

            // --- 4. Call Trampoline ---
            await step('p3', ['tr1'], 'path2', "Proxy: 关键！委托 Trampoline 跑原逻辑");

            // --- 5. Trampoline Run ---
            await step('tr1', [], null, "Tramp: 补执行第1条原指令");
            await step('tr2', [], null, "Tramp: 补执行第2条原指令");
            await step('tr4', ['t3'], 'path3', "Tramp: 回旋镖！跳回原函数中部");

            // --- 6. Back to Target ---
            await step('t3', [], null, "Target: 成功着陆 (Mid)，继续执行");
            await step('t4', [], null, "Target: 执行剩余代码...");
            await step('t5', ['p4'], 'path4', "Target: 执行完毕，返回 (RET)");

            // --- 7. Back to Proxy ---
            await step('p4', [], null, "Proxy: 拿到结果，执行 After 回调");
            await step('p6', ['c3'], 'path5', "Proxy: 最终返回给用户");

            // --- 8. Back to Caller ---
            await step('c3', [], null, "Caller: 继续执行下一行，完全不知情。");

            statusText.innerText = "演示结束";
            clearFocus(); // 恢复全亮
            document.getElementById('resetBtn').disabled = false;
        }

        function resetSimulation() {
            clearFocus();
            statusText.innerText = "准备就绪...";
            document.getElementById('startBtn').disabled = false;
        }
        
        // 初始化时先全部亮着
        clearFocus();

    </script>
</body>
</html>
