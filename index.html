<!DOCTYPE html>

  <link rel="preconnect" href="https://fonts.loli.net">

<body class="bg-slate-950 text-slate-300 min-h-screen selection:bg-indigo-500/30">
  
  <div class="max-w-6xl mx-auto px-6 py-12 md:py-20">

    <div class="text-center mb-16 space-y-4">

        </span>
        Code Grimoire 魔法书

      <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight">
        代码原理<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">可视化演示</span>合集

      <p class="text-slate-400 text-lg max-w-2xl mx-auto leading-relaxed">

      </p>

        <div class="flex items-start justify-between mb-4">

            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />

        </div>
        <h2 class="text-lg font-bold text-slate-200 group-hover:text-white mb-2 transition-colors">ARM64 调用栈与栈操作演示</h2>
        <div class="flex items-center text-sm text-slate-500 group-hover:text-slate-400">
          <span>点击查看演示</span>
          <svg class="w-4 h-4 ml-1 opacity-0 group-hover:opacity-100 transform translate-x-[-4px] group-hover:translate-x-0 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        </div>
      </a>
      <a href="inline-hook.html" class="group block p-6 rounded-2xl bg-slate-800/50 hover:bg-slate-800 border border-slate-700 hover:border-indigo-500/50 transition-all duration-300 shadow-lg hover:shadow-indigo-500/10 hover:-translate-y-1">
        <div class="flex items-start justify-between mb-4">
          <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-400 group-hover:text-indigo-300 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />

      <p class="text-slate-600 text-sm">
        Generated by <code class="bg-slate-900 px-1.5 py-0.5 rounded text-slate-500 font-mono text-xs">generate_index.py</code>
        &middot; Composed with <span class="text-red-500/50">♥</span> and Python
